dist:
  name: otelcol-retrosampling
  description: OpenTelemetry Collector with retroactive sampling processor
  output_path: ./bin
  otelcol_version: "0.150.0"

processors:
  - import: retroactivesampling/processor/retroactivesampling
    gomod: retroactivesampling/processor/retroactivesampling v0.0.0
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.150.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.150.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.150.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.150.0

replaces:
  - retroactivesampling/processor/retroactivesampling => ./processor/retroactivesampling
  - retroactivesampling => ./
