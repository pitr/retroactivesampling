extensions:
  pprof:
    endpoint: 0.0.0.0:1778

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4318

processors:
  retroactive_sampling:
    buffer_dir: ./retrosampling2
    max_buffer_bytes: 1048576  # 1 MB
    coordinator_endpoint: localhost:9090
    rules:
      - type: error_status
      - type: high_latency
        threshold: 5s

exporters:
  debug:
    verbosity: basic
  otlphttp:
    traces_endpoint: http://localhost:10428/insert/opentelemetry/v1/traces

service:
  extensions: [pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [retroactive_sampling]
      exporters: [debug, otlphttp]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8889
