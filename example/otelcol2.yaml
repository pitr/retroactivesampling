receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4318

processors:
  retroactive_sampling:
    buffer_db_path: ./retrosampling2.db
    buffer_ttl: 10s
    drop_ttl: 30s
    interest_cache_ttl: 60s
    coordinator_endpoint: localhost:9090
    rules:
      - type: error_status
      - type: high_latency
        threshold: 5s

exporters:
  debug:
    verbosity: basic
  otlphttp:
    traces_endpoint: http://localhost:10428/insert/opentelemetry/v1/traces

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [retroactive_sampling]
      exporters: [debug, otlphttp]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8889
