extensions:
  pprof:
    endpoint: 0.0.0.0:1777

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  retroactive_sampling:
    buffer_file: ./data/retrosampling1.ring
    max_buffer_bytes: 1073741824  # 1 GB
    decision_wait_time: 10s
    coordinator_grpc:
      endpoint: localhost:9090
      tls:
        insecure: true
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: slow
        type: latency
        latency:
          threshold_ms: 5000

exporters:
  debug:
    verbosity: basic
  otlp_http:
    traces_endpoint: http://localhost:10428/insert/opentelemetry/v1/traces
  otlp_grpc:
    endpoint: localhost:9000
    tls:
      insecure: true

service:
  extensions: [pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [retroactive_sampling]
      exporters: [otlp_http, otlp_grpc]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
