extensions:
  pprof:
    endpoint: 0.0.0.0:1777

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  retroactive_sampling:
    buffer_file: ./data/retrosampling1.ring
    max_buffer_bytes: 10485760  # 10 MB
    coordinator_endpoint: localhost:9090
    rules:
      - type: error_status
      - type: high_latency
        threshold: 5s

exporters:
  debug:
    verbosity: basic
  otlp_http:
    traces_endpoint: http://localhost:10428/insert/opentelemetry/v1/traces

service:
  extensions: [pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [retroactive_sampling]
      exporters: [otlp_http]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
