syntax = "proto3";
package coordinator;
option go_package = "pitr.ca/retroactivesampling/proto";

service Coordinator {
  rpc Connect(stream ProcessorMessage) returns (stream CoordinatorMessage);
}

message ProcessorMessage {
  oneof payload {
    NotifyInteresting notify = 1;
  }
}

message CoordinatorMessage {
  oneof payload {
    BatchTraceDecision batch = 1;
  }
}

message NotifyInteresting {
  bytes trace_id = 1;
}

message BatchTraceDecision {
  repeated bytes trace_ids = 1;
}
