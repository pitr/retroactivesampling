type: retroactive_sampling

tests:
  config:
    buffer_file: /tmp/retrosampling-lifecycle-test.ring
    max_buffer_bytes: 1048576
    coordinator_grpc:
      endpoint: "127.0.0.1:4317"
      tls:
        insecure: true

status:
  class: processor
  stability:
    development: [traces]

telemetry:
  metrics:
    retroactive_sampling_buffer_live_bytes:
      description: Bytes in the ring buffer still reachable by traceID
      stability: development
      unit: By
      enabled: true
      gauge:
        value_type: int
        async: true

    retroactive_sampling_buffer_orphaned_bytes:
      description: Bytes in ring buffer used accounting but no longer indexed (pending sweep)
      stability: development
      unit: By
      enabled: true
      gauge:
        value_type: int
        async: true

    retroactive_sampling_buffer_span_age_on_eviction:
      description: Age of span batches (in seconds) when evicted from the ring buffer due to pressure
      stability: development
      unit: s
      enabled: true
      histogram:
        value_type: int
