type: retroactive_sampling

tests:
  config:
    buffer_file: /tmp/retrosampling-lifecycle-test.ring
    max_buffer_bytes: 1048576
    coordinator_grpc:
      endpoint: "127.0.0.1:4317"
      tls:
        insecure: true

status:
  class: processor
  stability:
    development: [traces]

telemetry:
  metrics:
    retroactive_sampling_buffer_live_bytes:
      description: Bytes in the ring buffer still reachable by traceID
      stability: development
      unit: By
      enabled: true
      gauge:
        value_type: int
        async: true

    retroactive_sampling_buffer_orphaned_bytes:
      description: Bytes in ring buffer used accounting but no longer indexed (pending sweep)
      stability: development
      unit: By
      enabled: true
      gauge:
        value_type: int
        async: true

    retroactive_sampling_buffer_span_age_on_eviction:
      description: Age of span batches (in milliseconds) when evicted from the ring buffer due to pressure
      stability: development
      unit: ms
      enabled: true
      histogram:
        value_type: int
        bucket_boundaries: [0, 1, 5, 10, 25, 50, 100, 250, 500, 1000, 2500, 5000, 10000, 30000, 60000]
